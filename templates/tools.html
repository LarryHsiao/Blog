{% extends "base.html" %} {% block content %}
<div class="tools-index">
  {% if section.content %}
  <div class="tools-intro">{{ section.content | safe }}</div>
  {% endif %}
  <ul class="tools-list">
    {% for page in section.pages %}
    <li class="tools-list-item">
      <a href="{{ page.permalink | safe }}">
        <span class="tools-list-title">{{ page.title }}</span>
        {% if page.description %}
        <span class="tools-list-desc">{{ page.description }}</span>
        {% endif %}
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock content %}
