{% extends "base.html" %} {% block content %}
<article class="tool-page">
  <header class="tool-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="tool-desc">{{ page.description }}</p>{% endif %}
  </header>
  <div class="tool-body">{{ page.content | safe }}</div>
</article>
{% endblock content %}
