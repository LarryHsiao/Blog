# The URL the site will be built for
base_url = "https://larryhsiao.com"

# Used in feeds
title = "賴瑞Blog"
description = ""

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
# To enable this, build zola with chinese index enable.
build_search_index = false 
default_language = "zh"

minify_html = true

generate_feeds = false
feed_limit = 5

taxonomies = [
    {name = "tags", rss = true},
]

[languages.en]
build_search_index = true
title = "LH Blog"
taxonomies = [{name = "tags", rss = true}]

[languages.jp]
build_search_index = true
title = "LH Blog"
taxonomies = [{name = "tags", rss = true}]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "1337"
render_emoji = true

[search]
include_title = true
include_description = false
include_content = true

[extra]
avatar_url = "https://www.gravatar.com/avatar/866967586e7dcc81d667689948de277c?s=150"
author = "蕭富云"
author_en = "Larry Hsiao"
tagline = "行動應用開發者 · Android & Flutter"
tagline_en = "Mobile App Developer · Android & Flutter"
tagline_jp = "モバイルアプリ開発者 · Android & Flutter"
about_url = "$BASE_URL/about/"
about_url_en = "$BASE_URL/about/en"
about_url_jp = "$BASE_URL/about/jp"

menus = [
    { url = "$BASE_URL/tags/", name = "標籤" },
    { url = "$BASE_URL/metis/", name = "Metis"}
]

menus_en = [
    { url = "$BASE_URL/tags/", name = "Tags" },
    { url = "$BASE_URL/metis/en", name = "Metis"}
]

menus_jp = [
    { url = "$BASE_URL/tags/", name = "Tags" },
    { url = "$BASE_URL/metis/jp", name = "Metis"}
]

